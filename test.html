<style>
  :root {
    --cream: #f5ede0;
    --cream-soft: #faf4ea;
    --cream-deep: #ebe0cf;
    --wine: #5c1f2e;
    --wine-deep: #3d1420;
    --wine-soft: #8a3a4d;
    --gold: #c9a961;
    --gold-soft: #e0c896;
    --ink: #2a1810;
    --ink-soft: #5a4438;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--cream);
    color: var(--ink);
    line-height: 1.6;
    overflow-x: hidden;
    font-weight: 400;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.05;
    z-index: 100;
    mix-blend-mode: multiply;
  }

  /* ===== 상단 헤더 (프로그레스) ===== */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 50;
    padding: 1.2rem 1.5rem 1rem;
    background: rgba(245, 237, 224, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(60, 20, 30, 0.06);
  }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.9rem;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--wine);
    font-size: 1.3rem;
    cursor: pointer;
    padding: 0.3rem;
    line-height: 1;
    transition: opacity 0.3s;
  }

  .back-btn:hover {
    opacity: 0.6;
  }

  .progress-text {
    font-size: 0.78rem;
    color: var(--ink-soft);
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .progress-text .current {
    color: var(--wine);
    font-weight: 700;
    font-size: 0.9rem;
  }

  .progress-text .slash {
    color: var(--ink-soft);
    margin: 0 0.2rem;
    opacity: 0.5;
  }

  .header-spacer {
    width: 24px;
  }

  /* 프로그레스 바 */
  .progress-bar {
    width: 100%;
    height: 3px;
    background: rgba(92, 31, 46, 0.1);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--wine), var(--gold));
    border-radius: 100px;
    transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    width: 0%;
  }

  /* ===== 메인 영역 ===== */
  main {
    padding: 7rem 1.5rem 3rem;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 600px;
    margin: 0 auto;
    width: 100%;
  }

  .question-container {
    opacity: 1;
    transform: translateX(0);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .question-container.exit-left {
    opacity: 0;
    transform: translateX(-30px);
  }

  .question-container.exit-right {
    opacity: 0;
    transform: translateX(30px);
  }

  .question-container.enter {
    opacity: 0;
    transform: translateX(30px);
  }

  /* 질문 번호 표시 */
  .q-num {
    font-size: 0.72rem;
    color: var(--gold);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }

  .q-num::before {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--gold);
  }

  /* 질문 텍스트 */
  .question {
    font-size: clamp(1.3rem, 5vw, 1.65rem);
    line-height: 1.5;
    color: var(--wine);
    font-weight: 700;
    margin-bottom: 2.5rem;
    letter-spacing: -0.025em;
  }

  /* 답변 옵션 */
  .options {
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
  }

  .option {
    background: var(--cream-soft);
    border: 1.5px solid rgba(92, 31, 46, 0.12);
    border-radius: 16px;
    padding: 1.3rem 1.4rem;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    text-align: left;
    font-family: 'Pretendard', sans-serif;
    font-size: 0.98rem;
    line-height: 1.55;
    color: var(--ink);
    font-weight: 500;
    position: relative;
    width: 100%;
    letter-spacing: -0.015em;
  }

  .option:hover {
    border-color: var(--wine-soft);
    background: var(--cream);
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(92, 31, 46, 0.08);
  }

  .option-marker {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--wine-soft);
    color: var(--wine-soft);
    font-size: 0.7rem;
    font-weight: 700;
    margin-right: 0.85rem;
    flex-shrink: 0;
    transition: all 0.3s;
    vertical-align: middle;
    margin-top: -2px;
  }

  .option:hover .option-marker {
    background: var(--wine);
    color: var(--cream);
    border-color: var(--wine);
  }

  /* 터치 기기(모바일)에서는 hover 잔상 방지 — hover 효과 무효화 */
  @media (hover: none) {
    .option:hover {
      border-color: rgba(92, 31, 46, 0.12);
      background: var(--cream-soft);
      transform: none;
      box-shadow: none;
    }
    .option:hover .option-marker {
      background: transparent;
      color: var(--wine-soft);
      border-color: var(--wine-soft);
    }
    .back-btn:hover { background: transparent; color: var(--wine); }
  }

  /* 선택된 상태 (애니메이션 중) */
  .option.selected {
    background: var(--wine);
    border-color: var(--wine);
    color: var(--cream);
    transform: scale(1.02);
    box-shadow: 0 12px 30px rgba(92, 31, 46, 0.25);
  }

  .option.selected .option-marker {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--wine-deep);
  }

  /* 뒤로 갔을 때 이전 선택 표시 (selected보다 은은하지만 또렷하게) */
  .option.preselected,
  .option.preselected:hover {
    border-color: var(--gold) !important;
    background: #faf3e4 !important;
    box-shadow: 0 2px 12px rgba(201, 169, 97, 0.2) !important;
  }

  .option.preselected .option-marker,
  .option.preselected:hover .option-marker {
    background: var(--gold) !important;
    border-color: var(--gold) !important;
    color: #fff !important;
  }

  /* ===== 격려 메시지 ===== */
  .encouragement {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--wine);
    color: var(--cream);
    padding: 0.7rem 1.4rem;
    border-radius: 100px;
    font-size: 0.85rem;
    font-weight: 500;
    box-shadow: 0 12px 30px rgba(92, 31, 46, 0.3);
    opacity: 0;
    pointer-events: none;
    transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    z-index: 60;
  }

  .encouragement.show {
    opacity: 1;
    transform: translateX(-50%) translateY(-10px);
  }

  /* ===== 로딩 화면 (분석 중) ===== */
  .loading {
    position: fixed;
    inset: 0;
    background: var(--cream);
    z-index: 200;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 2rem;
  }

  .loading.show {
    display: flex;
  }

  .loading-emoji {
    font-size: 3rem;
    margin-bottom: 2rem;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  .loading-title {
    font-size: 1.4rem;
    color: var(--wine);
    font-weight: 700;
    margin-bottom: 0.7rem;
    letter-spacing: -0.02em;
  }

  .loading-text {
    font-size: 0.9rem;
    color: var(--ink-soft);
    margin-bottom: 2.5rem;
    font-weight: 400;
    line-height: 1.6;
  }

  .loading-dots {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
  }

  .loading-dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--gold);
    animation: dot 1.4s ease-in-out infinite;
  }

  .loading-dots span:nth-child(1) { animation-delay: 0s; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot {
    0%, 80%, 100% { transform: scale(0.5); opacity: 0.4; }
    40% { transform: scale(1.2); opacity: 1; }
  }

  /* ===== 데스크톱 ===== */
  @media (min-width: 768px) {
    header {
      padding: 1.5rem 3rem 1.2rem;
    }

    main {
      padding: 9rem 3rem 4rem;
    }

    .question {
      font-size: 1.7rem;
      margin-bottom: 3rem;
    }

    .option {
      padding: 1.5rem 1.6rem;
      font-size: 1rem;
    }
  }
</style>
</head>

    // Q20 [2축·역]
    { axis: 2, reverse: true, q: '"각자 시간이 필요해"라는 말이…',
      a: '당연하고 건강한 거라고 생각한다',
      b: '머리론 이해해도 마음은 좀 서운하다',
      scoreA: 'S', scoreB: 'C' },
    // Q21 [1축·정]
    { axis: 1, reverse: false, q: '기념일이나 특별한 날에…',
      a: '내가 먼저 챙기고 표현한다',
      b: '챙기긴 하지만 조용히, 티 안 나게 한다',
      scoreA: 'E', scoreB: 'H' },
    // Q22 [4축·정]
    { axis: 4, reverse: false, q: '풀리지 않은 갈등이 있을 때…',
      a: '잠도 못 잘 정도로 신경 쓰여 결국 먼저 연락한다',
      b: '답답하지만 시간이 해결해줄 거라 둔다',
      c: '상황을 보다가 필요하면 내가 먼저 푼다',
      scoreA: 'F', scoreB: 'A' },
    // Q23 [3축·역]
    { axis: 3, reverse: true, q: '연애 초반 가장 중요한 것은?',
      a: '서로의 라이프스타일과 조건이 맞는지',
      b: '둘만의 케미, 감정의 깊이',
      scoreA: 'L', scoreB: 'R' },
    // Q24 [2축·정]
    { axis: 2, reverse: false, q: '연인과 같은 공간에 있을 때…',
      a: '계속 대화하거나 닿아있고 싶다',
      b: '각자 할 일 하면서 같은 공간에 있는 게 좋다',
      scoreA: 'C', scoreB: 'S' }
  ];

  // 격려 메시지 (특정 진행 시점에 노출)
  const ENCOURAGEMENTS = {
    6: '잘하고 있어요 ✨',
    12: '절반 왔어요 🎉',
    18: '거의 다 왔어요 💕',
    23: '마지막 질문이에요!'
  };

  // 로딩 화면 랜덤 문구
  const LOADING_MESSAGES = [
    '당신의 연애 패턴을 정리하고 있어요...',
    '가장 가까운 유형을 찾고 있어요...',
    '궁합에 중요한 성향을 분석하고 있어요...',
    '4가지 축의 균형을 맞추고 있어요...'
  ];

  // ===== 상태 관리 =====
  let currentIndex = 0;
  let answers = []; // { qIndex, choice: 'A'|'B', score: 'E'|'H'|... }

  // ===== 렌더링 =====
  function renderQuestion(direction = 'normal') {
    const container = document.getElementById('questionContainer');
    const q = QUESTIONS[currentIndex];

    // 페이드 아웃 후 변경
    if (direction !== 'normal') {
      container.classList.add(direction === 'next' ? 'exit-left' : 'exit-right');
    }

    setTimeout(() => {
      const saved = answers[currentIndex]?.choice;
      container.innerHTML = `
        <div class="q-num">Question ${String(currentIndex + 1).padStart(2, '0')}</div>
        <h1 class="question">${q.q}</h1>
        <div class="options">
          <button type="button" class="option ${saved === 'A' ? 'preselected' : ''}" onclick="selectAnswer('A')">
            <span class="option-marker">A</span>
            ${q.a}
          </button>
          <button type="button" class="option ${saved === 'B' ? 'preselected' : ''}" onclick="selectAnswer('B')">
            <span class="option-marker">B</span>
            ${q.b}
          </button>
          ${q.c ? `
          <button type="button" class="option ${saved === 'C' ? 'preselected' : ''}" onclick="selectAnswer('C')">
            <span class="option-marker">C</span>
            ${q.c}
          </button>` : ''}
        </div>
      `;

      // 페이드 인
      container.classList.remove('exit-left', 'exit-right');
      if (direction !== 'normal') {
        container.classList.add('enter');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            container.classList.remove('enter');
          });
        });
      }

      updateProgress();
    }, direction !== 'normal' ? 250 : 0);
  }

  function updateProgress() {
    document.getElementById('currentQ').textContent = currentIndex + 1;
    const pct = ((currentIndex + 1) / QUESTIONS.length) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
  }

  // ===== 답변 선택 =====
  function selectAnswer(choice) {
    const q = QUESTIONS[currentIndex];
    // A/B는 해당 축 점수, C(중간)는 양축 0.5씩 → score에 'mid' 표시
    let score;
    if (choice === 'A') score = q.scoreA;
    else if (choice === 'B') score = q.scoreB;
    else score = 'mid'; // 중간 답변

    // 시각적 선택 효과
    const options = document.querySelectorAll('.option');
    options.forEach(o => o.style.pointerEvents = 'none');
    const idx = choice === 'A' ? 0 : (choice === 'B' ? 1 : 2);
    if (options[idx]) options[idx].classList.add('selected');

    // 답변 저장 (이전 답변이 있으면 덮어쓰기)
    answers[currentIndex] = { qIndex: currentIndex, choice, score, axis: q.axis };

    // 격려 메시지 표시 (해당 질문 번호일 때)
    const qNum = currentIndex + 1;
    if (ENCOURAGEMENTS[qNum]) {
      showEncouragement(ENCOURAGEMENTS[qNum]);
    }

    // 다음 문항 또는 결과
    setTimeout(() => {
      if (currentIndex < QUESTIONS.length - 1) {
        currentIndex++;
        renderQuestion('next');
      } else {
        // 마지막 문항: 프로그레스 100% 채우고 결과 계산
        document.getElementById('progressFill').style.width = '100%';
        finishTest();
      }
    }, 550);
  }

  // ===== 격려 메시지 표시 =====
  function showEncouragement(text) {
    const el = document.getElementById('encouragement');
    el.textContent = text;
    el.classList.add('show');
    setTimeout(() => {
      el.classList.remove('show');
    }, 2000);
  }

  // ===== 뒤로 가기 =====
  function goBack() {
    if (currentIndex === 0) {
      if (confirm('테스트를 그만두시겠어요? 진행 상황이 사라져요.')) {
        window.location.href = 'index.html';
      }
    } else {
      currentIndex--;
      renderQuestion('prev');
    }
  }

  // ===== 결과 산출 =====
  function calculateResult() {
    const scores = { E: 0, H: 0, C: 0, S: 0, R: 0, L: 0, F: 0, A: 0 };

    answers.forEach(ans => {
      if (ans.score === 'mid') {
        // 중간 답변: 해당 문항 축의 양쪽에 0.5씩
        const q = QUESTIONS[ans.qIndex];
        scores[q.scoreA] += 0.5;
        scores[q.scoreB] += 0.5;
      } else {
        scores[ans.score]++;
      }
    });

    // 4축 각각 결과 결정
    let type = '';
    type += scores.E >= scores.H ? 'E' : 'H';
    type += scores.C >= scores.S ? 'C' : 'S';
    type += scores.R >= scores.L ? 'R' : 'L';
    type += scores.F >= scores.A ? 'F' : 'A';

    // 동점(애매한) 축 표시 — 결과 페이지에서 "중간 성향" 안내용
    const ties = {
      axis1: scores.E === scores.H,
      axis2: scores.C === scores.S,
      axis3: scores.R === scores.L,
      axis4: scores.F === scores.A
    };

    return {
      type,
      scores,
      ties,
      // 각 축의 강도 (백분율)
      strengths: {
        axis1: Math.round((Math.max(scores.E, scores.H) / 6) * 100),
        axis2: Math.round((Math.max(scores.C, scores.S) / 6) * 100),
        axis3: Math.round((Math.max(scores.R, scores.L) / 6) * 100),
        axis4: Math.round((Math.max(scores.F, scores.A) / 6) * 100)
      }
    };
  }

  // ===== 테스트 완료 =====
  function finishTest() {
    setTimeout(() => {
      // 로딩 화면 표시 + 랜덤 문구
      const loading = document.getElementById('loading');
      const msgEl = document.getElementById('loadingMsg');
      if (msgEl) {
        msgEl.textContent = LOADING_MESSAGES[Math.floor(Math.random() * LOADING_MESSAGES.length)];
      }
      loading.classList.add('show');

      // 결과 계산
      const result = calculateResult();

      // 확장용 payload (답변 원본 + 메타데이터)
      const payload = {
        result,
        answers,
        completedAt: new Date().toISOString(),
        version: '1.0.0'
      };

      try {
        // lt16_result: 기존 페이지 호환 — result 객체를 그대로 저장 (type 바로 접근 가능)
        sessionStorage.setItem('lt16_result', JSON.stringify(result));
        // lt16_last_result: 확장용 전체 payload (재방문/분석/재검사용)
        localStorage.setItem('lt16_last_result', JSON.stringify(payload));
      } catch (e) {
        /* Storage not available */
      }

      // 점수를 URL로 압축 전달 (공유 가능 + 결과 페이지가 실제 점수 반영)
      const s = result.scores;
      const scoreParam = `${s.E}${s.H}${s.C}${s.S}${s.R}${s.L}${s.F}${s.A}`;

      setTimeout(() => {
        window.location.href = `result.html?type=${result.type}&s=${scoreParam}`;
      }, 1800);
    }, 400);
  }

  // ===== 초기 렌더링 =====
  // 테스트 시작 시 상태 완전 초기화 (이전 답변/결과가 남지 않도록)
  function startFresh() {
    currentIndex = 0;
    answers = [];
    try {
      sessionStorage.removeItem('lt16_result');
    } catch (e) {}
    renderQuestion();
  }

  startFresh();

  // 뒤로가기 캐시(bfcache)로 복원될 때도 강제 새로고침 처리
  window.addEventListener('pageshow', (e) => {
    if (e.persisted) {
      // 캐시에서 복원된 경우 페이지를 새로 로드해 상태 초기화
      window.location.reload();
    }
  });

  // 키보드 지원 (A/B 키, 좌우 화살표)
  document.addEventListener('keydown', (e) => {
    if (document.getElementById('loading').classList.contains('show')) return;
    if (e.key === '1' || e.key === 'a' || e.key === 'A') selectAnswer('A');
    else if (e.key === '2' || e.key === 'b' || e.key === 'B') selectAnswer('B');
    else if (e.key === 'ArrowLeft') goBack();
  });
</script>
