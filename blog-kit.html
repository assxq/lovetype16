<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블로그 글감 키트 — Love Type 16</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root {
    --cream:#f5ede0; --cream-soft:#faf4ea; --cream-deep:#ebe0cf;
    --wine:#5c1f2e; --wine-deep:#3d1420; --wine-soft:#8a3a4d;
    --gold:#c9a961; --gold-soft:#e0c896;
    --ink:#2a1810; --ink-soft:#5a4438; --ink-light:#8a7468;
    --done:#4a7c4e;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'Pretendard',-apple-system,sans-serif;
    background:var(--cream); color:var(--ink); line-height:1.6;
    -webkit-font-smoothing:antialiased; padding-bottom:4rem;
  }
  header {
    background:var(--wine-deep); color:var(--cream);
    padding:2.5rem 1.5rem 2rem; text-align:center;
  }
  .h-marker { font-size:0.7rem; letter-spacing:0.3em; color:var(--gold); text-transform:uppercase; font-weight:600; margin-bottom:0.8rem; }
  h1 { font-size:1.6rem; font-weight:700; letter-spacing:-0.02em; margin-bottom:0.5rem; }
  .h-sub { font-size:0.88rem; color:var(--gold-soft); line-height:1.6; }

  /* 진행률 */
  .progress-wrap { max-width:760px; margin:1.5rem auto 0; padding:0 1.5rem; }
  .progress-bar { height:8px; background:rgba(245,237,224,0.15); border-radius:100px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-soft)); width:0%; transition:width 0.4s; border-radius:100px; }
  .progress-text { font-size:0.8rem; color:var(--gold-soft); margin-top:0.6rem; text-align:center; }

  /* 필터 */
  .controls { max-width:760px; margin:1.5rem auto 0; padding:0 1.5rem; display:flex; gap:0.5rem; flex-wrap:wrap; justify-content:center; }
  .filter-btn {
    font-size:0.8rem; font-weight:500; font-family:inherit;
    color:var(--wine); background:transparent;
    border:1px solid rgba(92,31,46,0.2); border-radius:100px;
    padding:0.45rem 1rem; cursor:pointer; transition:all 0.25s;
  }
  .filter-btn.active { background:var(--wine); color:var(--cream); border-color:var(--wine); }

  /* 카드 목록 */
  .list { max-width:760px; margin:1.5rem auto 0; padding:0 1.5rem; display:flex; flex-direction:column; gap:0.8rem; }
  .card {
    background:var(--cream-soft); border:1px solid rgba(92,31,46,0.1);
    border-radius:14px; overflow:hidden; transition:all 0.25s;
  }
  .card.done { opacity:0.6; }
  .card.done .card-title { text-decoration:line-through; }
  .card-head {
    display:flex; align-items:center; gap:0.8rem;
    padding:1.1rem 1.2rem; cursor:pointer;
  }
  .card-check {
    width:24px; height:24px; border-radius:50%; flex-shrink:0;
    border:2px solid rgba(92,31,46,0.25); background:var(--cream);
    display:flex; align-items:center; justify-content:center;
    font-size:0.8rem; color:#fff; transition:all 0.2s;
  }
  .card.done .card-check { background:var(--done); border-color:var(--done); }
  .card-num { font-size:0.72rem; color:var(--gold); font-weight:700; min-width:1.5rem; }
  .card-info { flex:1; min-width:0; }
  .card-cat { font-size:0.66rem; color:var(--wine-soft); font-weight:600; letter-spacing:0.05em; margin-bottom:0.2rem; }
  .card-title { font-size:0.95rem; color:var(--wine); font-weight:700; letter-spacing:-0.01em; line-height:1.35; }
  .card-toggle { font-size:0.9rem; color:var(--ink-light); transition:transform 0.25s; }
  .card.open .card-toggle { transform:rotate(180deg); }

  .card-body { display:none; padding:0 1.2rem 1.3rem; border-top:1px solid rgba(92,31,46,0.07); }
  .card.open .card-body { display:block; }
  .section { margin-top:1.1rem; }
  .sec-label { font-size:0.7rem; letter-spacing:0.1em; color:var(--gold); text-transform:uppercase; font-weight:600; margin-bottom:0.5rem; display:flex; align-items:center; justify-content:space-between; }
  .copy-btn { font-size:0.68rem; color:var(--wine); background:rgba(92,31,46,0.07); border:none; border-radius:6px; padding:0.25rem 0.6rem; cursor:pointer; font-family:inherit; font-weight:500; }
  .copy-btn:active { background:var(--wine); color:var(--cream); }
  .title-opt { font-size:0.9rem; color:var(--ink); padding:0.5rem 0.7rem; background:var(--cream); border-radius:8px; margin-bottom:0.4rem; line-height:1.4; cursor:pointer; border:1px solid rgba(92,31,46,0.06); }
  .title-opt:active { border-color:var(--gold); }
  .outline-list { list-style:none; }
  .outline-list li { font-size:0.86rem; color:var(--ink); line-height:1.6; padding:0.4rem 0 0.4rem 1.3rem; position:relative; }
  .outline-list li::before { content:''; position:absolute; left:0; top:0.85rem; width:5px; height:5px; border-radius:50%; background:var(--gold); }
  .kw-wrap { display:flex; flex-wrap:wrap; gap:0.4rem; }
  .kw { font-size:0.76rem; color:var(--wine-soft); background:rgba(201,169,97,0.12); border-radius:100px; padding:0.3rem 0.7rem; }
  .img-prompt { font-size:0.83rem; color:var(--ink-soft); line-height:1.6; background:var(--cream); border-radius:8px; padding:0.8rem 0.9rem; border:1px solid rgba(92,31,46,0.06); font-family:ui-monospace,monospace; }

  .toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(2rem); background:var(--wine); color:var(--cream); padding:0.7rem 1.3rem; border-radius:100px; font-size:0.85rem; font-weight:500; opacity:0; transition:all 0.3s; z-index:100; box-shadow:0 10px 30px rgba(60,20,30,0.3); }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  .tip { max-width:760px; margin:2rem auto 0; padding:1.2rem 1.5rem; background:var(--cream-soft); border:1px solid rgba(92,31,46,0.08); border-radius:12px; font-size:0.82rem; color:var(--ink-soft); line-height:1.7; }
  .tip strong { color:var(--wine); }
  @media (min-width:768px){ .list{ } }
</style>
</head>
<body>

<header>
  <div class="h-marker">— Content Kit —</div>
  <h1>블로그 글감 키트</h1>
  <p class="h-sub">매주 하나씩, 약 7개월 발행 분량 30개<br>체크하면 진행 상황이 저장돼요</p>
</header>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
  <div class="progress-text" id="progText">0 / 30 완료</div>
</div>

<div class="controls" id="filters"></div>
<div class="list" id="list"></div>

<div class="tip">
  <strong>이렇게 쓰세요</strong><br>
  ① 제목 후보 중 하나를 골라 (탭하면 복사) → ② 개요를 뼈대로 본문에 살 붙이기 → ③ 키워드를 글·태그에 자연스럽게 녹이기 → ④ 이미지 프롬프트를 제미나이(Gemini)에 넣어 대표 이미지 생성 → ⑤ 발행 후 체크. 30개를 순서대로 쓸 필요는 없어요. 그날 끌리는 주제부터 쓰면 글이 더 자연스러워져요.
</div>

const STORE_KEY = 'lt16_blog_done';

function getDone() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch(e){ return []; }
}
function setDone(arr){ localStorage.setItem(STORE_KEY, JSON.stringify(arr)); }

let currentFilter = '전체';

function render() {
  // 필터 버튼
  const cats = ['전체', ...new Set(DATA.topics.map(t=>t.category))];
  document.getElementById('filters').innerHTML = cats.map(c=>
    `<button class="filter-btn ${c===currentFilter?'active':''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');

  const done = getDone();
  const list = currentFilter==='전체' ? DATA.topics : DATA.topics.filter(t=>t.category===currentFilter);

  document.getElementById('list').innerHTML = list.map(t=>{
    const isDone = done.includes(t.id);
    return `
    <div class="card ${isDone?'done':''}" id="card-${t.id}">
      <div class="card-head">
        <div class="card-check" onclick="toggleDone(${t.id}, event)">${isDone?'✓':''}</div>
        <span class="card-num">${String(t.id).padStart(2,'0')}</span>
        <div class="card-info" onclick="toggleOpen(${t.id})">
          <div class="card-cat">${t.category} · ${t.keyword}</div>
          <div class="card-title">${t.titles[0]}</div>
        </div>
        <span class="card-toggle" onclick="toggleOpen(${t.id})">▾</span>
      </div>
      <div class="card-body">
        <div class="section">
          <div class="sec-label">제목 후보 (탭하면 복사)</div>
          ${t.titles.map(title=>`<div class="title-opt" onclick="copyText('${esc(title)}')">${title}</div>`).join('')}
        </div>
        <div class="section">
          <div class="sec-label">본문 개요</div>
          <ul class="outline-list">${t.outline.map(o=>`<li>${o}</li>`).join('')}</ul>
        </div>
        <div class="section">
          <div class="sec-label">키워드 / 태그</div>
          <div class="kw-wrap">${t.keywords.map(k=>`<span class="kw">#${k}</span>`).join('')}</div>
        </div>
        <div class="section">
          <div class="sec-label">이미지 프롬프트 (Gemini) <button class="copy-btn" onclick="copyText('${esc(t.image_prompt)}')">복사</button></div>
          <div class="img-prompt">${t.image_prompt}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  updateProgress();
}

function esc(s){ return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function toggleOpen(id){
  document.getElementById('card-'+id).classList.toggle('open');
}
function toggleDone(id, e){
  e.stopPropagation();
  let done = getDone();
  if(done.includes(id)) done = done.filter(x=>x!==id);
  else done.push(id);
  setDone(done);
  render();
}
function setFilter(c){ currentFilter=c; render(); }

function updateProgress(){
  const done = getDone().length;
  const total = DATA.topics.length;
  const pct = Math.round(done/total*100);
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progText').textContent = `${done} / ${total} 완료  (${pct}%)`;
}

function copyText(text){
  const t = text.replace(/&quot;/g,'"');
  navigator.clipboard.writeText(t).then(()=>showToast('복사됐어요 ✨'))
    .catch(()=>showToast('복사 실패 — 직접 선택해주세요'));
}
let toastTimer;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 1800);
}

render();
</script>
