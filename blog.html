  /* 카테고리 필터 */

    display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap;
    padding: 0 1.5rem 2.5rem; max-width: 700px; margin: 0 auto;
  }
  .cat-btn {
    font-size: 0.82rem; font-weight: 500; font-family: 'Pretendard', sans-serif;

    border: 1px solid rgba(92, 31, 46, 0.2); border-radius: 100px;
    padding: 0.5rem 1.1rem; cursor: pointer; transition: all 0.3s;
  }
  .cat-btn:hover { border-color: var(--wine); }

  /* 글 목록 */

    max-width: 700px; margin: 0 auto; padding: 0 1.5rem;

  .post-card {
    display: block; text-decoration: none;

    border: 1px solid rgba(92, 31, 46, 0.1);

    transition: all 0.3s;

  .post-card:hover {

  .post-title {

  }
  .post-excerpt {
    font-size: 0.88rem; color: var(--ink-soft); line-height: 1.65;

  .post-meta {

  .post-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-light); }

  /* 하단 CTA */

<script>
  // ===== 블로그 글 목록 =====
  // 새 글을 추가하려면 이 배열에 항목을 넣고, 같은 slug의 HTML 파일을 만들면 돼요.
  const POSTS = [
    {
      slug: 'blog-avoidant',
      cat: 'advice', catLabel: '연애 고민',
      title: '회피형 애인, 어떻게 다가가야 할까',
      excerpt: '연락이 뜸해지고 거리를 두는 그 사람. 마음이 식은 걸까요? 회피형 연인의 속마음과 현명하게 다가가는 법을 정리했어요.',
      date: '2026.05.04', read: '5분'
    },
    {
      slug: 'blog-tired',
      cat: 'advice', catLabel: '연애 고민',
      title: '권태기가 왔을 때 읽는 글',
      excerpt: '설렘이 사라진 자리에 남는 건 권태가 아니라 다른 형태의 사랑일지도 몰라요. 권태기를 함께 건너는 법.',
      date: '2026.05.04', read: '6분'
    },
    {
      slug: 'blog-expression',
      cat: 'advice', catLabel: '연애 고민',
      title: '"사랑한다 말 안 하는 사람" 이해하기',
      excerpt: '표현이 적은 연인 때문에 늘 불안한가요? 표현 방식이 다른 것뿐일 수 있어요. 은은한 사랑을 읽는 법.',
      date: '2026.05.04', read: '5분'
    },
    {
      slug: 'blog-16types',
      cat: 'type', catLabel: '유형 이야기',
      title: '16가지 연애 유형, 한눈에 보기',
      excerpt: '표현·거리·사고·갈등 4가지 축으로 나뉘는 16가지 연애 유형. 각 유형의 핵심 매력을 한 번에 정리했어요.',
      date: '2026.05.04', read: '7분'
    }
  ];

  function renderPosts(filter = 'all') {
    const list = filter === 'all' ? POSTS : POSTS.filter(p => p.cat === filter);
    document.getElementById('posts').innerHTML = list.map(p => `
      <a class="post-card" href="${p.slug}.html">
        <span class="post-cat ${p.cat}">${p.catLabel}</span>
        <div class="post-title">${p.title}</div>
        <div class="post-excerpt">${p.excerpt}</div>
        <div class="post-meta">
          <span>${p.date}</span>
          <span class="dot"></span>
          <span>${p.read} 읽기</span>
        </div>
      </a>
    `).join('');
  }

  function filterPosts(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPosts(cat);
  }

  renderPosts();
</script>
